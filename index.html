<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minjee's Personal Website</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Center the loading screen content */
        #loading-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Ensure the loading screen covers the entire viewport height */
            background-color: #f0f0f0; /* Adjust background color as needed */
        }

        /* Center the splash screen content */
        #splash-content {
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <!-- Splash Screen Content -->
        <div id="splash-content">
            <!-- Add your splash screen content here -->
            <h1>Welcome to Minjee's Website</h1>
            <p>Loading...</p>
        </div>

        <!-- Loading Animation (Optional) -->
        <div id="loading-animation">
            <!-- Add loading animation or spinner here -->
        </div>
    </div>

    <!-- Main Content (Initially hidden) -->
    <div id="main-content" style="display: none;">
        <header>
            <!-- Your header content here -->
        </header>

        <main>
            <!-- Your main content here -->
        </main>

        <footer>
            <!-- Your footer content here -->
        </footer>
    </div>

    <!-- JavaScript to control loading and transitions -->
    <script>
        // Simulate a delay (e.g., 3 seconds) for demonstration
        setTimeout(function () {
            var loadingScreen = document.getElementById("loading-screen");
            var mainContent = document.getElementById("main-content");

            // Hide the loading screen and show the main content
            loadingScreen.style.display = "none";
            mainContent.style.display = "block";
        }, 3000); // Adjust the delay time as needed (in milliseconds)
    </script>
</body>
</html>
