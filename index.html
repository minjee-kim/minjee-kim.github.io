<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minjee Kim, PhD Student @ Texas A&M</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #fddde6;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
        }
        .left-panel {
            width: 20%;
            background-color: #fff;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
            overflow-y: auto;
        }
        .left-panel img {
            width: 100%;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        .left-panel h2 {
            margin-top: 0;
            font-size: 1.5em;
            color: #cc3366;
        }
        .left-panel p {
            margin-bottom: 10px;
        }
        .left-panel a {
            font-size: 0.9em;
            color: #007bff;
            text-decoration: none;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            word-wrap: break-word;
        }
        .left-panel a i {
            margin-right: 8px;
            font-size: 1.1em;
        }
        .right-panel {
            width: 75%;
            padding: 25px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .banner {
            width: 100%;
            height: 70px; 
            object-fit: cover; 
            display: block;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tabs a {
            font-size: 1.2em;
            color: #cc3366;
            text-decoration: none;
            padding: 10px 15px;
            border: 1px solid #cc3366;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            cursor: pointer;
        }
        .tabs a:hover {
            background-color: #cc3366;
            color: #fff;
        }
        .content section {
            display: none; /* Hide all sections by default */
            margin-bottom: 20px;
        }
        .content section.active {
            display: block; /* Show the active section */
        }
        .content h2 {
            margin-top: 0;
            font-size: 1.8em;
            color: #cc3366;
        }
        .content p {
            font-size: 1em;
            color: #333;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <img src="images/profile.jpg" alt="Minjee Kim" style="width:100%; border-radius:50%; margin-bottom:20px;">
        <p><a href="mailto:minjeekim0804@tamu.edu"><i class="fas fa-envelope"></i>Email</a></p>
        <p><a href="https://www.linkedin.com/in/minjee-kim/"><i class="fab fa-linkedin"></i>LinkedIn</a></p>
        <p><a href="https://github.com/minjee-kim"><i class="fab fa-github"></i>GitHub</a></p>
    </div>

    <div class="right-panel">
        <!-- Banner image on top of the right panel -->
        <img src="images/stats_and_the_city_with_border.jpg" alt="Banner Image" class="banner">

        <!-- Tabs below the banner -->
        <div class="tabs">
            <a href="#about" onclick="showSection('about')">About Me</a>
            <a href="#research" onclick="showSection('research')">Research</a>
            <a href="#publications" onclick="showSection('publications')">Publications</a>
            <a href="#blog" onclick="showSection('blog')">Blog</a>
        </div>

        <div class="content">
            <section id="about" class="active">
                <h2>About Me</h2>
                <p>Brief introduction about yourself...</p>
            </section>
            <section id="research">
                <h2>Research</h2>
                <p>Details about your research...</p>
            </section>
            <section id="publications">
                <h2>Publications</h2>
                <p>List your publications here...</p>
            </section>
            <section id="blog">
                <h2>Blog</h2>
                <p>Information about your teaching experience...</p>
            </section>
        </div>
    </div>

    <script>
        function showSection(sectionId) {
            // Hide all sections
            var sections = document.querySelectorAll('.content section');
            sections.forEach(function(section) {
                section.classList.remove('active');
            });

            // Show the clicked section
            document.getElementById(sectionId).classList.add('active');
        }

        // By default, show the "About Me" section
        document.getElementById('about').classList.add('active');
    </script>
</body>
</html>
